version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hotel-db
    restart: always
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:

      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: hotel-app
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  pg_data: